<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OsColorMe - 3D Manuel Kamuflaj</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Oyun 3D Render Alanı -->
    <div id="game-container"></div>

    <!-- Mobil Sanal Joystick -->
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>

    <!-- UI Kontrol Paneli: Manuel Renk Boyama Alanı -->
    <div id="ui-panel">
        <h3>OsColorMe Kamuflaj Paleti</h3>
        <p>Arandaki nesneye göre bölgelerini manuel boya!</p>
        
        <div class="color-picker-group">
            <label for="picker-head">🤠 Kafa Rengi:</label>
            <input type="color" id="picker-head" value="#ffffff">
        </div>
        
        <div class="color-picker-group">
            <label for="picker-body">👕 Gövde Rengi:</label>
            <input type="color" id="picker-body" value="#ffffff">
        </div>
        
        <div class="color-picker-group">
            <label for="picker-legs">👖 Bacak Rengi:</label>
            <input type="color" id="picker-legs" value="#ffffff">
        </div>
    </div>

    <!-- Socket.io ve Three.js Bağımlılıkları -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
